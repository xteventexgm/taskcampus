<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskCampus</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div id="app" class="max-w-4xl mx-auto bg-white p-6 rounded shadow mt-10">
        <h1 class="text-3xl font-bold mb-6 text-gray-800">TaskCampus</h1>
        
        <form id="taskForm" class="mb-8 bg-gray-50 p-4 rounded border border-gray-200">
            <h2 class="text-xl font-semibold mb-4">Registrar Nueva Tarea</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="titulo" placeholder="Título de la tarea" required class="border p-2 rounded">
                <input type="text" id="asignatura" placeholder="Asignatura" required class="border p-2 rounded">
                <textarea id="descripcion" placeholder="Descripción" class="border p-2 rounded col-span-1 md:col-span-2"></textarea>
                <input type="date" id="fechaEntrega" required class="border p-2 rounded">
                <select id="prioridad" class="border p-2 rounded">
                    <option value="baja">Prioridad Baja</option>
                    <option value="media" selected>Prioridad Media</option>
                    <option value="alta">Prioridad Alta</option>
                </select>
                <select id="estado" class="border p-2 rounded">
                    <option value="pendiente" selected>Pendiente</option>
                    <option value="en proceso">En proceso</option>
                    <option value="finalizada">Finalizada</option>
                </select>
            </div>
            <button type="submit" class="mt-4 w-full bg-blue-600 text-white font-bold px-4 py-2 rounded hover:bg-blue-700 transition">
                Guardar Tarea
            </button>
        </form>

        <div class="mt-8 grid grid-cols-2 md:grid-cols-4 gap-4 mb-6 text-center">
            <div class="bg-blue-100 p-4 rounded shadow border border-blue-200">
                <h3 class="text-xs font-bold text-blue-800 uppercase tracking-wide">Total Tareas</h3>
                <p id="resTotal" class="text-3xl font-black text-blue-600 mt-2">0</p>
            </div>
            <div class="bg-yellow-100 p-4 rounded shadow border border-yellow-200">
                <h3 class="text-xs font-bold text-yellow-800 uppercase tracking-wide">Pendientes</h3>
                <p id="resPendientes" class="text-3xl font-black text-yellow-600 mt-2">0</p>
            </div>
            <div class="bg-green-100 p-4 rounded shadow border border-green-200">
                <h3 class="text-xs font-bold text-green-800 uppercase tracking-wide">Finalizadas</h3>
                <p id="resFinalizadas" class="text-3xl font-black text-green-600 mt-2">0</p>
            </div>
            <div class="bg-red-100 p-4 rounded shadow border border-red-200">
                <h3 class="text-xs font-bold text-red-800 uppercase tracking-wide">Alta Prioridad</h3>
                <p id="resAlta" class="text-3xl font-black text-red-600 mt-2">0</p>
            </div>
        </div>

        <div class="mb-8 bg-gray-50 p-4 rounded border border-gray-200 flex flex-col md:flex-row gap-4 items-end">
            <div class="flex-1 w-full">
                <label class="text-xs font-bold text-gray-600 mb-1 block">Filtrar por Estado</label>
                <select id="filtroEstado" class="w-full border p-2 rounded">
                    <option value="todos">Todos los estados</option>
                    <option value="pendiente">Pendiente</option>
                    <option value="en proceso">En proceso</option>
                    <option value="finalizada">Finalizada</option>
                </select>
            </div>
            <div class="flex-1 w-full">
                <label class="text-xs font-bold text-gray-600 mb-1 block">Filtrar por Prioridad</label>
                <select id="filtroPrioridad" class="w-full border p-2 rounded">
                    <option value="todos">Todas las prioridades</option>
                    <option value="baja">Baja</option>
                    <option value="media">Media</option>
                    <option value="alta">Alta</option>
                </select>
            </div>
            <div class="flex-1 w-full">
                <label class="text-xs font-bold text-gray-600 mb-1 block">Buscar Asignatura</label>
                <input type="text" id="filtroAsignatura" placeholder="Escribe para buscar..." class="w-full border p-2 rounded">
            </div>
            <button id="btnLimpiarFiltros" class="bg-gray-500 text-white font-bold px-4 py-2 rounded hover:bg-gray-600 transition w-full md:w-auto">
                Limpiar
            </button>
        </div>

        
        <div class="mt-10">
            <h2 class="text-2xl font-bold mb-4 text-gray-800">Mis Tareas</h2>
            <div id="taskList" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                </div>
        </div>
    </div>
    <script type="module" src="dist/app.js"></script>
</body>
</html>
